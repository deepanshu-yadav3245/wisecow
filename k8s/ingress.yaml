apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wisecow-ingress
  labels:
    app: wisecow
  annotations:
    # Redirect all HTTP traffic to HTTPS (secure TLS communication)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wisecow.local
      secretName: wisecow-tls   # Created from the self-signed cert (see tls/generate-tls.sh)
  rules:
    - host: wisecow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wisecow-service
                port:
                  number: 80
