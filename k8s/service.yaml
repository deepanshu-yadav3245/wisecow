apiVersion: v1
kind: Service
metadata:
  name: wisecow-service
  labels:
    app: wisecow
spec:
  type: NodePort
  selector:
    app: wisecow
  ports:
    - name: http
      port: 80          # Service port (used by the Ingress)
      targetPort: 4499  # Container port
      nodePort: 30499   # Direct access for quick testing: http://<node-ip>:30499
